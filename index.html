<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pulse</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%236366f1'/%3E%3Cstop offset='100%25' stop-color='%23a855f7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23g)'/%3E%3Ctext x='50' y='68' font-size='55' font-weight='800' fill='white' text-anchor='middle' font-family='sans-serif'%3EP%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="auth-screen">
    <div class="auth-box">
      <div class="auth-logo">Pulse</div>
      <p class="auth-subtitle">Sign in to start chatting</p>
      <button id="google-btn" class="google-btn">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.54 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.98-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
      <div class="auth-error"></div>
    </div>
  </div>

  <div id="app-screen" class="hidden">
    <div class="aurora" aria-hidden="true">
      <span class="aurora-blob b1"></span>
      <span class="aurora-blob b2"></span>
      <span class="aurora-blob b3"></span>
    </div>
    <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">P</div>
        <h2>Pulse</h2>
        <button id="settings-btn" title="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
      <div class="profile-card" id="profile-card">
        <div class="user-avatar" id="my-avatar"></div>
        <div class="profile-meta">
          <span id="my-nickname"></span>
          <span class="profile-sub">online</span>
        </div>
      </div>
      <div class="sidebar-search">
        <svg class="search-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search @username">
        <div id="search-results" class="search-results hidden"></div>
      </div>
      <div class="sidebar-scroll">
        <div class="chats-section">
          <h3><span class="sec-dot"></span>Chats <button id="create-chat-btn" class="create-chat-btn" title="Create group or channel"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></h3>
          <div id="chats-list"></div>
        </div>
        <div class="online-users-section">
          <h3><span class="sec-dot"></span>Online</h3>
          <div id="online-users"></div>
        </div>
        <div class="recent-section">
          <h3><span class="sec-dot"></span>Recent</h3>
          <div id="recent-users"></div>
        </div>
      </div>
    </aside>
    <main class="chat-area" id="chat-area">
      <div id="chat-placeholder" class="chat-placeholder">
        <div class="placeholder-logo">P</div>
        <p>Select a chat to start messaging</p>
      </div>
      <div id="chat-active" style="display:none">
        <div class="chat-header">
          <div class="chat-header-info">
            <button id="chat-back" class="chat-back-btn" title="Back">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="chat-avatar" id="chat-avatar"></div>
            <div class="chat-user-meta" id="chat-user-meta" style="cursor:pointer">
              <div id="chat-partner-name"></div>
              <div class="chat-status" id="chat-status">offline</div>
            </div>
            <button id="profile-eye-btn" class="header-btn" title="View profile">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <button id="chat-delete-btn" class="chat-delete-btn" title="Delete chat">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </div>
        <div class="messages-container" id="messages-container">
          <div id="messages-list"></div>
        </div>
        <div id="typing-indicator" class="typing-indicator"><span></span><span></span><span></span></div>
        <div class="message-input-area">
          <div id="photo-pending-bar" class="photo-pending-bar" style="display:none">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            <span>Photo attached</span>
            <button id="photo-pending-cancel" class="photo-pending-cancel">✕</button>
          </div>
          <button id="photo-upload-btn" title="Attach photo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input type="text" id="message-input" placeholder="Message…" autocomplete="off">
          <button id="send-btn" title="Send">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
          <input type="file" id="photo-upload-file" accept="image/*" style="display:none">
        </div>
      </div>
    </main>
    </div>
  </div>

  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-backdrop"></div>
    <div class="settings-content">
      <div class="settings-header">
        <h3>Settings</h3>
        <button id="settings-close" title="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#71717a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="settings-body">
        <div class="settings-section">
          <h4>Profile</h4>
          <div class="settings-user">
            <div class="user-avatar" id="settings-avatar"></div>
            <div>
              <div id="settings-nickname"></div>
              <div id="settings-username" class="settings-username"></div>
            </div>
          </div>
        </div>
        <div class="settings-section">
          <h4>Change nickname</h4>
          <div class="change-row">
            <input type="text" id="nickname-input" placeholder="New nickname">
            <button id="nickname-btn">Save</button>
          </div>
          <div id="nickname-error" class="settings-error"></div>
        </div>
        <div class="settings-section">
          <h4>Change @username</h4>
          <div class="change-row">
            <input type="text" id="username-input" placeholder="@newusername">
            <button id="username-btn">Save</button>
          </div>
          <div id="username-error" class="settings-error"></div>
        </div>
        <div class="settings-section">
          <h4>Avatar</h4>
          <div class="avatar-upload-row">
            <label class="avatar-upload-label">
              <input type="file" id="avatar-input" accept="image/*" style="display:none">
              <span class="avatar-upload-btn">Upload photo</span>
            </label>
            <button id="avatar-remove-btn" class="avatar-remove-btn">Remove</button>
          </div>
          <div id="avatar-error" class="settings-error"></div>
        </div>
        <div class="settings-section">
          <h4>Theme</h4>
          <div class="theme-selector">
            <button class="theme-option active" data-theme="dark">Dark</button>
            <button class="theme-option" data-theme="light">Light</button>
          </div>
        </div>
        <button id="admin-btn" class="settings-admin-btn hidden">Admin Panel</button>
        <button id="settings-logout" class="settings-logout">Logout</button>
      </div>
    </div>
  </div>

  <div id="admin-panel" class="admin-panel" style="display:none">
    <div class="admin-backdrop"></div>
    <div class="admin-content">
      <div class="admin-header">
        <h3>Admin Panel</h3>
        <button id="admin-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#71717a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="admin-tabs">
        <button id="admin-tab-users" class="admin-tab active">Users</button>
        <button id="admin-tab-chats" class="admin-tab">Chats</button>
      </div>
      <div class="admin-search">
        <input type="text" id="admin-search-input" placeholder="Search...">
      </div>
      <div class="admin-body" id="admin-body"></div>
    </div>
  </div>

  <div id="profile-panel" class="profile-panel" style="display:none">
    <div class="profile-backdrop"></div>
    <div class="profile-content">
      <button id="profile-close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a1a1aa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="profile-avatar" id="profile-avatar"></div>
      <div id="profile-nickname"></div>
      <div id="profile-username"></div>
      <div id="profile-label"></div>
      <div id="profile-status"></div>
    </div>
  </div>

  <div id="create-chat-modal" class="create-chat-modal" style="display:none">
    <div class="create-chat-backdrop"></div>
    <div class="create-chat-content">
      <div class="create-chat-header">
        <h3>Create</h3>
        <button id="create-chat-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#71717a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="create-chat-body">
        <div class="create-type-selector">
          <button id="create-type-group" class="create-type-btn active" data-type="group">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Group
          </button>
          <button id="create-type-channel" class="create-type-btn" data-type="channel">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 8 14 13 2 18 6 17 11 21 18 13 22 12 18 11 11 5"/></svg>
            Channel
          </button>
        </div>
        <div class="create-field">
          <label>Name</label>
          <input type="text" id="create-chat-name" placeholder="Chat name" maxlength="50">
        </div>
        <div class="create-field">
          <label>@username (optional, unique)</label>
          <input type="text" id="create-chat-username" placeholder="@username" maxlength="20">
          <div id="create-chat-username-status" class="create-field-status"></div>
        </div>
        <div class="create-field">
          <label>Description (optional)</label>
          <input type="text" id="create-chat-desc" placeholder="What is this about?" maxlength="200">
        </div>
        <div id="create-chat-error" class="create-field-status" style="color:#ef4444"></div>
        <button id="create-chat-submit" class="create-chat-submit">Create</button>
      </div>
    </div>
  </div>

  <div id="members-modal" class="members-modal" style="display:none">
    <div class="members-backdrop"></div>
    <div class="members-content">
      <div class="members-header">
        <h3>Members</h3>
        <button id="members-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#71717a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="members-body" id="members-body"></div>
    </div>
  </div>

  <div id="confirm-modal" class="confirm-modal" style="display:none">
    <div class="confirm-backdrop"></div>
    <div class="confirm-box">
      <div class="confirm-text" id="confirm-text">Are you sure?</div>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="confirm-cancel" onclick="hideConfirm()">Cancel</button>
        <button id="confirm-ok" class="confirm-ok" onclick="confirmOk()">Delete</button>
      </div>
    </div>
  </div>

  <script>
  // Deterrent only: blocks right-click + common devtools/view-source shortcuts.
  // NOTE: this cannot truly hide client source — it just stops casual snooping.
  (function () {
    document.addEventListener('contextmenu', function (e) { e.preventDefault(); return false; }, true);
    document.addEventListener('keydown', function (e) {
      var k = (e.key || '').toLowerCase();
      var blocked =
        e.key === 'F12' || e.key === 'F9' ||                              // devtools / pause
        (e.ctrlKey && e.shiftKey && (k === 'i' || k === 'j' || k === 'c')) || // inspect/console/picker
        (e.metaKey && e.altKey && (k === 'i' || k === 'j' || k === 'c')) ||   // mac devtools
        (e.ctrlKey && k === 'u') ||                                        // view-source
        (e.metaKey && e.altKey && k === 'u') ||                            // mac view-source
        (e.ctrlKey && k === 's') ||                                        // save page
        (e.ctrlKey && k === 'p') ||                                        // print -> source
        (e.ctrlKey && k === 'k') ||                                        // Yandex/search bar
        (e.ctrlKey && k === 'e') ||                                        // search bar (some browsers)
        (e.ctrlKey && k === 'g');                                          // find again
      if (blocked) { e.preventDefault(); e.stopPropagation(); return false; }
    }, true);
    // Also swallow long-press / drag selection menus on mobile
    document.addEventListener('selectstart', function (e) {
      if (e.target && /^(INPUT|TEXTAREA)$/.test(e.target.tagName)) return; // keep typing usable
      e.preventDefault();
    });
  })();
  </script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://messenger-server-vwkj-production.up.railway.app/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
